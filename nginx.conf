server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hide nginx version in error pages and the Server header.
  server_tokens off;

  # Security headers applied to every response.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # Long-cache fingerprinted assets emitted by Vite (hashed filenames).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
    try_files $uri =404;
  }

  # Never cache the app shell — otherwise clients keep an old index.html
  # that references assets deleted by the next deploy.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires -1;
  }

  # Lightweight health check for load balancers / orchestrators.
  location = /healthz {
    access_log off;
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }

  # SPA: hand every other route to index.html for client-side routing.
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/wasm
    image/svg+xml
    font/woff2;
}
